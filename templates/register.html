{% extends "base.html" %}

{% block title %}Smart ATS - Register{% endblock %}

{% block header_title %}Create Account{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-8 animate-fade-in-up">
    <div class="glass-panel p-8 space-y-6">
        
        <div class="text-center space-y-2">
            <h2 class="text-2xl font-bold text-white tracking-tight">Get Started</h2>
            <p class="text-xs text-slate-400">Join candidates and recruiters optimizing profiles.</p>
        </div>

        <form action="{{ url_for('register') }}" method="POST" class="space-y-4">
            <div class="space-y-1">
                <label for="username" class="text-xs font-semibold text-slate-300">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="far fa-user"></i>
                    </span>
                    <input type="text" id="username" name="username" required class="glass-input pl-10 pr-4 py-2.5 w-full text-sm" placeholder="john_doe">
                </div>
            </div>

            <div class="space-y-1">
                <label for="email" class="text-xs font-semibold text-slate-300">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="far fa-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" required class="glass-input pl-10 pr-4 py-2.5 w-full text-sm" placeholder="name@example.com">
                </div>
            </div>

            <div class="space-y-1">
                <label for="role" class="text-xs font-semibold text-slate-300">Account Type</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="fas fa-briefcase"></i>
                    </span>
                    <select id="role" name="role" required class="glass-input pl-10 pr-4 py-2.5 w-full text-sm appearance-none cursor-pointer">
                        <option value="user" class="bg-slate-900 text-slate-100">Candidate (Job Seeker)</option>
                        <option value="recruiter" class="bg-slate-900 text-slate-100">Recruiter / Employer</option>
                        <option value="admin" class="bg-slate-900 text-slate-100">System Administrator</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-semibold text-slate-300">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" required class="glass-input pl-10 pr-4 py-2.5 w-full text-sm" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="glass-panel w-full py-3 bg-indigo-600 hover:bg-indigo-500 border-none font-bold text-white transition text-sm rounded-lg shadow-lg shadow-indigo-600/25">
                Create Free Account
            </button>
        </form>

        <div class="text-center text-xs text-slate-400 pt-2 border-t border-slate-800/80">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="text-indigo-400 hover:underline font-semibold ml-1">Sign In</a>
        </div>

    </div>
</div>
{% endblock %}
