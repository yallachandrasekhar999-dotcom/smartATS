{% extends "base.html" %}

{% block title %}Smart ATS - My Profile{% endblock %}

{% block header_title %}Profile Settings{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6 animate-fade-in-up">
    
    <div class="glass-panel p-6 space-y-6">
        <div class="flex items-center gap-4 pb-4 border-b border-slate-800/80">
            <div class="w-14 h-14 bg-indigo-600/20 border border-indigo-500/30 rounded-full flex items-center justify-center text-indigo-400 text-2xl font-bold font-sans uppercase">
                {{ current_user.username[0] }}
            </div>
            <div>
                <h3 class="text-xl font-bold text-white">{{ current_user.username }}</h3>
                <p class="text-xs text-slate-400">Account Type: <span class="capitalize font-semibold text-indigo-400">{{ current_user.role }}</span></p>
            </div>
        </div>

        <form action="{{ url_for('profile') }}" method="POST" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label for="username" class="text-xs font-semibold text-slate-300">Username</label>
                    <input type="text" id="username" name="username" value="{{ current_user.username }}" required class="glass-input p-2.5 w-full text-sm">
                </div>
                
                <div class="space-y-1">
                    <label for="email" class="text-xs font-semibold text-slate-300">Email Address</label>
                    <input type="email" id="email" name="email" value="{{ current_user.email }}" required class="glass-input p-2.5 w-full text-sm">
                </div>
            </div>

            <div class="space-y-1">
                <label for="role" class="text-xs font-semibold text-slate-300">Update Account Role</label>
                <select id="role" name="role" class="glass-input p-2.5 w-full text-sm appearance-none cursor-pointer">
                    <option value="user" {% if current_user.role == 'user' %}selected{% endif %}>Candidate (Job Seeker)</option>
                    <option value="recruiter" {% if current_user.role == 'recruiter' %}selected{% endif %}>Recruiter / Employer</option>
                    <option value="admin" {% if current_user.role == 'admin' %}selected{% endif %}>System Administrator</option>
                </select>
            </div>

            <div class="pt-4 border-t border-slate-800/80">
                <h4 class="text-xs font-bold text-slate-300 uppercase tracking-wider mb-3">Change Password (Optional)</h4>
                <div class="space-y-1">
                    <label for="password" class="text-xs font-semibold text-slate-300">New Password</label>
                    <input type="password" id="password" name="password" class="glass-input p-2.5 w-full text-sm" placeholder="Leave blank to keep current password">
                </div>
            </div>

            <button type="submit" class="glass-panel px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 border-none font-bold text-white transition text-xs rounded-lg shadow-lg shadow-indigo-600/20">
                Save Profile Changes
            </button>
        </form>
    </div>

</div>
{% endblock %}
