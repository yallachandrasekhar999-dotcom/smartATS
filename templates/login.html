{% extends "base.html" %}

{% block title %}Smart ATS - Login{% endblock %}

{% block header_title %}Account Access{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 animate-fade-in-up">
    <div class="glass-panel p-8 space-y-6">
        
        <div class="text-center space-y-2">
            <h2 class="text-2xl font-bold text-white tracking-tight">Welcome Back</h2>
            <p class="text-xs text-slate-400">Login to your dashboard to analyze resumes.</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
            <div class="space-y-1">
                <label for="email" class="text-xs font-semibold text-slate-300">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="far fa-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" required class="glass-input pl-10 pr-4 py-2.5 w-full text-sm" placeholder="name@example.com">
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex items-center justify-between">
                    <label for="password" class="text-xs font-semibold text-slate-300">Password</label>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" required class="glass-input pl-10 pr-4 py-2.5 w-full text-sm" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="glass-panel w-full py-3 bg-indigo-600 hover:bg-indigo-500 border-none font-bold text-white transition text-sm rounded-lg shadow-lg shadow-indigo-600/25">
                Sign In
            </button>
        </form>

        <div class="text-center text-xs text-slate-400 pt-2 border-t border-slate-800/80">
            Don't have an account? 
            <a href="{{ url_for('register') }}" class="text-indigo-400 hover:underline font-semibold ml-1">Create free account</a>
        </div>

    </div>
</div>
{% endblock %}
